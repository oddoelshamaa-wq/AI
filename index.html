<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELSHAMAA AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="illusion-bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- تأكد أن الـ ID هنا هو chatWrapper -->
    <div class="chat-wrapper" id="chatWrapper">
        <div class="chat-container">
            <div class="chat-header">
                <h1 class="logo-3d">ELSHAMAA</h1>
                <p>مساعدك الذكي</p>
            </div>
            
            <div id="chat-box" class="chat-box">
                <div class="message ai-message">أهلاً بك في عالم الشماع! اكتب سؤالك وهرد عليك فوراً.</div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." autocomplete="off">
                <button id="send-btn">إرسال</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
