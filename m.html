<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الشماع | مراقبة وحذف المحادثات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --danger-color: #ff7675;
            --bg-color: #f0f2f5;
            --sidebar-width: 350px;
            --user-msg: #ffffff;
            --ai-msg: #dcf8c6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover { background: #f8f9fa; }
        .chat-item.active { background: #e8e6ff; border-right: 5px solid var(--primary-color); }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-item .user-id { font-weight: bold; color: #333; font-size: 0.9rem; }
        .chat-item .last-msg { font-size: 0.8rem; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* منطقة المحادثة */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        .chat-header { padding: 15px 25px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; display: flex; justify-content: space-between; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* فقاعات الرسائل */
        .msg {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            group: hover;
        }

        .msg.user { align-self: flex-start; background: var(--user-msg); border-top-right-radius: 0; }
        .msg.assistant { align-self: flex-end; background: var(--ai-msg); border-top-left-radius: 0; }

        /* أزرار الحذف */
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            opacity: 0.3;
            transition: 0.3s;
        }

        .chat-item:hover .delete-btn, .msg:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #d63031; transform: scale(1.2); }

        .msg-content { display: flex; flex-direction: column; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .msg-info { font-size: 10px; font-weight: bold; color: var(--primary-color); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #888; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">محادثات العملاء</div>
        <div id="chat-list" class="chat-list">
            <div class="empty-state">جاري تحميل المحادثات...</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <span id="active-user-title">اختر عميل لمشاهدة المحادثة</span>
            <span id="session-id-display" style="font-size: 12px; color: #888;"></span>
        </div>
        
        <div id="messages-container" class="messages-container">
            <div class="empty-state">
                <h3>مرحباً بك في لوحة تحكم الشماع</h3>
                <p>اختر محادثة لعرضها، ويمكنك حذف رسائل محددة أو المحادثة كاملة.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // تم إضافة remove هنا
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxMe4Sww_i_O3e_MQXn1dcgkRdKQh6pks",
            authDomain: "elshamaa-ai.firebaseapp.com",
            databaseURL: "https://elshamaa-ai-default-rtdb.firebaseio.com",
            projectId: "elshamaa-ai",
            storageBucket: "elshamaa-ai.firebasestorage.app",
            messagingSenderId: "764546614549",
            appId: "1:764546614549:web:0a766032decbf76dcb151c",
            measurementId: "G-NW29XPP4L6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const chatListDiv = document.getElementById('chat-list');
        const messagesDiv = document.getElementById('messages-container');
        const headerTitle = document.getElementById('active-user-title');
        const sessionIdDisplay = document.getElementById('session-id-display');

        let currentActiveId = null;

        // وظيفة حذف المحادثة بالكامل
        window.deleteFullChat = function(sessionId, event) {
            event.stopPropagation(); // منع فتح المحادثة عند النقر على حذف
            if (confirm("هل أنت متأكد من حذف هذه المحادثة بالكامل؟ لا يمكن التراجع!")) {
                remove(ref(db, `chats/${sessionId}`))
                .then(() => {
                    if (currentActiveId === sessionId) {
                        currentActiveId = null;
                        messagesDiv.innerHTML = '<div class="empty-state">تم حذف المحادثة.</div>';
                        headerTitle.innerText = "اختر عميل";
                    }
                });
            }
        };

        // وظيفة حذف رسالة واحدة
        window.deleteSingleMessage = function(sessionId, messageKey) {
            if (confirm("حذف هذه الرسالة؟")) {
                remove(ref(db, `chats/${sessionId}/messages/${messageKey}`));
            }
        };

        // 1. مراقبة قائمة المحادثات
        onValue(ref(db, 'chats'), (snapshot) => {
            const chats = snapshot.val();
            chatListDiv.innerHTML = "";

            if (!chats) {
                chatListDiv.innerHTML = '<div class="empty-state">لا توجد محادثات.</div>';
                return;
            }

            const sessionIds = Object.keys(chats).reverse();
            sessionIds.forEach(id => {
                const meta = chats[id].metadata || {};
                const item = document.createElement('div');
                item.className = `chat-item ${currentActiveId === id ? 'active' : ''}`;
                
                item.innerHTML = `
                    <div class="chat-info" onclick="loadChat('${id}')">
                        <div class="user-id">العميل: ${id.replace('user_', '')}</div>
                        <div class="last-msg">${meta.lastMessage || 'محادثة جديدة...'}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteFullChat('${id}', event)" title="حذف المحادثة">🗑️</button>
                `;
                chatListDiv.appendChild(item);
            });
        });

        // 2. تحميل الرسائل
        window.loadChat = function(sessionId) {
            currentActiveId = sessionId;
            headerTitle.innerText = "محادثة العميل الحالية";
            sessionIdDisplay.innerText = "ID: " + sessionId;

            onValue(ref(db, `chats/${sessionId}/messages`), (snapshot) => {
                if (currentActiveId !== sessionId) return;

                messagesDiv.innerHTML = "";
                const msgs = snapshot.val();

                if (!msgs) {
                    messagesDiv.innerHTML = '<div class="empty-state">لا توجد رسائل.</div>';
                    return;
                }

                Object.keys(msgs).forEach(key => {
                    const m = msgs[key];
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${m.role}`;
                    
                    const roleName = m.role === 'user' ? 'العميل' : 'بوت الشماع';
                    msgDiv.innerHTML = `
                        <div class="msg-header">
                            <span class="msg-info">${roleName}</span>
                            <button class="delete-btn" style="font-size:10px" onclick="deleteSingleMessage('${sessionId}', '${key}')">✕</button>
                        </div>
                        <div class="msg-content">${m.text.replace(/\n/g, '<br>')}</div>
                    `;
                    
                    messagesDiv.appendChild(msgDiv);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
